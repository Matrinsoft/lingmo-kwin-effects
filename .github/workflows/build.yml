name: Build
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-24.04
    container: debian:trixie
    steps:
      - name: Install git
        run: apt-get update -qq && apt-get install -y -qq git
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          apt-get update -qq && apt-get install -y -qq \
            cmake ninja-build g++ \
            qt6-base-dev \
            extra-cmake-modules \
            libkf6configwidgets-dev libkf6kcmutils-dev \
            libxcb1-dev libxcb-ewmh-dev libxcb-randr0-dev libxcb-xfixes0-dev \
            libepoxy-dev \
            libkwin-dev
      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - name: Build
        run: cmake --build build --parallel
